services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: alexandria-postgres
    restart: always
    environment:
      POSTGRES_DB: alexandria
      POSTGRES_USER: alexandria_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandria_user -d alexandria"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # PROD: Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: alexandria-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:
      MINIO_ROOT_PASSWORD:
      MINIO_BROWSER: "off"
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    volumes:
      - minio_data:/data
      - ./certs:/root/.minio/certs
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # MinIO Client
  minio-init:
    image: minio/mc:latest
    container_name: alexandria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:
      MINIO_ROOT_PASSWORD:
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set alexandria http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb alexandria/alexandria-files --ignore-existing;
      /usr/bin/mc mb alexandria/alexandria-thumbnails --ignore-existing;
      /usr/bin/mc mb alexandria/alexandria-temp --ignore-existing;
      /usr/bin/mc anonymous set none alexandria/alexandria-files;
      /usr/bin/mc anonymous set download alexandria/alexandria-thumbnails;
      /usr/bin/mc ilm add alexandria/alexandria-temp --expiry-days 1;
      /usr/bin/mc admin policy create alexandria readonly-files /policies/readonly.json;
      echo 'MinIO PROD initialization completed';
      "
    volumes:
      - ./minio-policies:/policies
    networks:
      - alexandria-network

  postgres-backup:
    image: postgres:15-alpine
    container_name: alexandria-postgres-backup
    depends_on:
      - postgres
    environment:
      PGPASSWORD:
    volumes:
      - ./backups:/backups
    entrypoint: >
      /bin/sh -c "
      while true; do
        pg_dump -h postgres -U alexandria_user -d alexandria -f /backups/alexandria_$(date +%Y%m%d_%H%M%S).sql;
        find /backups -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done
      "
    networks:
      - alexandria-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  alexandria-network:
    driver: bridge
