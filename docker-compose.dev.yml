services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: alexandria-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: alexandria_dev
      POSTGRES_USER: alexandria_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandria_user -d alexandria_dev"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Garage Object Storage (default S3-compatible storage)
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: alexandria-garage-dev
    restart: unless-stopped
    environment:
      RUST_LOG: garage=info
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_meta_data:/var/lib/garage/meta
      - garage_storage_data:/var/lib/garage/data
    ports:
      - "9000:3900" # S3 API (mapped to 9000 for compatibility)
      - "9001:3903" # Admin API (mapped to 9001 for compatibility)
      - "3901:3901" # RPC
      - "3902:3902" # S3 Web (optional)
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    profiles:
      - garage
      - default

  # RustFS Object Storage (alternative S3-compatible storage)
  # rustfs:
  #   image: rustfs/rustfs:latest
  #   container_name: alexandria-rustfs-dev
  #   restart: unless-stopped
  #   command:
  #     - "--address"
  #     - ":3900"
  #     - "--console-enable"
  #     - "--access-key"
  #     - "${RUSTFS_ACCESS_KEY:-dev_admin}"
  #     - "--secret-key"
  #     - "${RUSTFS_SECRET_KEY:-dev_password_123}"
  #     - "/data"
  #   environment:
  #     RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-dev_admin}
  #     RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-dev_password_123}
  #     RUSTFS_CONSOLE_ENABLE: "true"
  #   volumes:
  #     - rustfs_dev_data:/data
  #   ports:
  #     - "9000:3900" # S3 API (mapped to 9000 for compatibility)
  #     - "9001:9001" # Console UI (mapped to 9001 for compatibility)
  #   networks:
  #     - alexandria-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 15s
  #   profiles:
  #     - rustfs

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: alexandria-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dev_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-dev_password_123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-alexandria}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,error},{default,error}] disk_free_limit 2147483648
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    ports:
      - "5672:5672" # AMQP protocol port
      - "15672:15672" # Management UI port
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: alexandria-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - alexandria-network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    profiles:
      - garage
      - monitoring
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: alexandria-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - alexandria-network
    depends_on:
      - prometheus
    profiles:
      - garage
      - monitoring
      - default

volumes:
  postgres_dev_data:
    driver: local
  minio_dev_data:
    driver: local
  garage_meta_data:
    driver: local
  garage_storage_data:
    driver: local
  rustfs_dev_data:
    driver: local
  rabbitmq_dev_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  alexandria-network:
    driver: bridge
