  postgres:
    image: postgres:16-alpine
    container_name: alexandria-postgres
    restart: always
    environment:
      POSTGRES_DB: alexandria
      POSTGRES_USER: alexandria_user
      POSTGRES_PASSWORD: {{DB_PASSWORD}}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandria_user -d alexandria"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
