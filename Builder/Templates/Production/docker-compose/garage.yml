  garage:
    image: dxflrs/garage:v2.2.0
    container_name: alexandria-garage
    restart: always
    environment:
      RUST_LOG: garage=info
    volumes:
      - ./garage.prod.toml:/etc/garage.toml:ro
      - garage_meta_data:/var/lib/garage/meta
      - garage_storage_data:/var/lib/garage/data
    networks:
      - alexandria-network
    healthcheck:
      test: ["CMD", "garage", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
