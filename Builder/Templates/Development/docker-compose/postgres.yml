# Templates/docker-compose/postgres.yml
postgres:
  image: postgres:16-alpine
  container_name: alexandria-postgres-{{ENVIRONMENT}}
  restart: unless-stopped
  environment:
    POSTGRES_DB: alexandria_{{ENVIRONMENT}}
    POSTGRES_USER: alexandria_user
    POSTGRES_PASSWORD: {{DB_PASSWORD}}
    POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
  volumes:
    - postgres_data:/var/lib/postgresql/data
  ports:
    - "{{POSTGRES_PORT}}:5432"
  networks:
    - alexandria-network
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U alexandria_user"]
    interval: 5s
    timeout: 3s
    retries: 3
    start_period: 10s