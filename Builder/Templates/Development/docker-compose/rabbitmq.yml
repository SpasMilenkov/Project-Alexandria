# Templates/docker-compose/rabbitmq.yml
rabbitmq:
  image: rabbitmq:3-management-alpine
  container_name: alexandria-rabbitmq-{{ENVIRONMENT}}
  restart: unless-stopped
  environment:
    RABBITMQ_DEFAULT_USER: {{RABBITMQ_USER}}
    RABBITMQ_DEFAULT_PASS: {{RABBITMQ_PASSWORD}}
    RABBITMQ_DEFAULT_VHOST: alexandria
  volumes:
    - rabbitmq_data:/var/lib/rabbitmq
  ports:
    - "{{RABBITMQ_PORT}}:5672"
    - "{{RABBITMQ_MANAGEMENT_PORT}}:15672"
  networks:
    - alexandria-network
  healthcheck:
    test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 20s